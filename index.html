<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="See Mee - Discover premium ethnic wear including Anarkali suits, Palazzo suits, Straight Cut suits, and Sharara suits. Handcrafted with elegance, designed for grace." />
    <title>See Mee - Premium Ethnic Wear & Women's Suits</title>
    
    <!-- DNS Prefetch for faster font loading -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    
    <!-- Preconnect to critical origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://res.cloudinary.com">
    
    <!-- Preload critical fonts (Playfair Display Bold for headings) -->
    <link rel="preload" 
          href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" 
          as="style" 
          onload="this.onload=null;this.rel='stylesheet'">
    
    <!-- Preload secondary fonts (Poppins for body text) -->
    <link rel="preload" 
          href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" 
          as="style" 
          onload="this.onload=null;this.rel='stylesheet'">
    
    <!-- Fallback for browsers without JavaScript -->
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    </noscript>
    
    <!-- Inline critical CSS for font fallback -->
    <style>
      /* System font fallback to prevent FOUT (Flash of Unstyled Text) */
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      }
      
      /* Prevent layout shift while fonts load */
      h1, h2, h3, h4, h5, h6 {
        font-family: Georgia, 'Times New Roman', serif;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
